<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Export Import SAC - Reporte Dinámico</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        darkBg: '#090D16',
                        panelBg: '#111827',
                        borderGray: '#1F2937'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #090D16; color: #F3F4F6; }
    </style>
</head>
<body class="font-sans antialiased p-6 md:p-12">
    <div class="max-w-6xl mx-auto space-y-10">
        
        <!-- Header -->
        <header class="border-b border-borderGray pb-8">
            <a href="../index_analisis.html" class="inline-flex items-center text-gray-400 hover:text-white transition-colors mb-6 text-sm font-semibold">
                <i class="fa-solid fa-arrow-left mr-2"></i> Volver al Portafolio
            </a>
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
                <div class="flex items-center gap-4">
                    <div class="bg-emerald-500/10 w-16 h-16 rounded-2xl flex items-center justify-center border border-emerald-500/20 shadow-lg">
                        <i class="fa-solid fa-file-excel text-emerald-400 text-3xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tight">Global Export Import SAC</h1>
                        <p class="text-gray-400 mt-1">Reporte Dinámico y Análisis de Datos <span class="text-gray-600 ml-2 font-mono text-xs uppercase font-semibold">v1.0.0</span></p>
                    </div>
                </div>
                <a href="../Global%20Export%20Import%20SAC%20-%20EA1.pdf" target="_blank" class="inline-flex items-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl transition-all hover:scale-105 shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-file-pdf mr-2 text-lg"></i> Ver Informe en PDF
                </a>
            </div>
        </header>

        <!-- Contenido Sheets -->
        <div class="bg-panelBg/80 backdrop-blur-sm border border-borderGray rounded-2xl p-6 md:p-8">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <p class="text-gray-400 text-sm leading-relaxed max-w-2xl">
                    Hoja de cálculo interactiva con el detalle de datos y proyecciones correspondientes a la empresa Global Export Import SAC.
                </p>
                
                <!-- Controles de Zoom -->
                <div class="flex items-center gap-1 bg-darkBg border border-borderGray rounded-lg p-1 shadow-inner">
                    <button onclick="zoomOut()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-emerald-400 hover:bg-borderGray rounded transition-colors" title="Alejar">
                        <i class="fa-solid fa-magnifying-glass-minus"></i>
                    </button>
                    <div class="flex items-center px-1">
                        <input type="number" id="zoom-level" value="100" min="40" max="200" step="10" class="text-xs font-mono font-bold text-white w-10 bg-transparent text-right focus:outline-none focus:text-emerald-400" onchange="manualZoom(this.value)">
                        <span class="text-xs font-mono font-bold text-white ml-1">%</span>
                    </div>
                    <button onclick="zoomIn()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-emerald-400 hover:bg-borderGray rounded transition-colors" title="Acercar">
                        <i class="fa-solid fa-magnifying-glass-plus"></i>
                    </button>
                    <div class="w-px h-6 bg-borderGray mx-1"></div>
                    <button onclick="resetZoom()" class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-white hover:bg-borderGray rounded transition-colors" title="Restablecer Zoom">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
            </div>

            <div class="w-full rounded-xl overflow-hidden border border-borderGray bg-white relative" style="height: 700px;">
                <div id="sheets-container" style="width: 100%; height: 100%; transform-origin: top left; transition: transform 0.2s ease, width 0.2s ease, height 0.2s ease;">
                    <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSdhl4rZFqezVCPmQyljWyZWhfmzYHpWgZeRfVixX1tmwBF1BtkW0XdcgI9dcbfnIheCTfWO2QN5oR0/pubhtml?widget=true&amp;headers=false" class="w-full h-full border-0"></iframe>
                </div>
            </div>
        </div>

    </div>

    <!-- Script para Controles de Zoom -->
    <script>
        let currentZoom = 1.0;
        const zoomStep = 0.15;
        const maxZoom = 2.0;
        const minZoom = 0.4;
        
        const container = document.getElementById('sheets-container');
        const zoomLabel = document.getElementById('zoom-level');

        function updateZoom() {
            // Aplicamos escala y ajustamos dimensiones para evitar espacios en blanco
            container.style.transform = `scale(${currentZoom})`;
            container.style.width = `${(100 / currentZoom)}%`;
            container.style.height = `${(100 / currentZoom)}%`;
            zoomLabel.value = Math.round(currentZoom * 100);
        }

        function manualZoom(value) {
            let num = parseInt(value);
            if (isNaN(num)) num = 100;
            if (num < minZoom * 100) num = minZoom * 100;
            if (num > maxZoom * 100) num = maxZoom * 100;
            
            currentZoom = num / 100;
            updateZoom();
        }

        function zoomIn() {
            if (currentZoom < maxZoom) {
                currentZoom += zoomStep;
                updateZoom();
            }
        }

        function zoomOut() {
            if (currentZoom > minZoom) {
                currentZoom -= zoomStep;
                updateZoom();
            }
        }

        function resetZoom() {
            currentZoom = 1.0;
            updateZoom();
        }
    </script>
</body>
</html>
